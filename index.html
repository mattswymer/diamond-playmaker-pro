<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Playmaker Pro | Architect V8.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="brand">Diamond<span>Architect</span></div>
        <div class="toolbar">
            <button class="btn" id="btn-undo" title="Ctrl+Z" disabled>↶ Undo</button>
            <button class="btn" id="btn-redo" title="Ctrl+Y" disabled>↷ Redo</button>
            <button class="btn btn-warning" id="btn-reset">🔄 Reset</button>
            <div style="width: 1px; background: var(--border); margin: 0 0.2rem;"></div>
            <button class="btn" id="btn-save">💾 Save</button>
            <button class="btn" id="btn-load">📂 Load</button>
            <input type="file" id="file-load" accept=".json" style="display: none;">
            <div style="width: 1px; background: var(--border); margin: 0 0.2rem;"></div>
            <button class="btn btn-primary" id="btn-play">▶ Play</button>
            <button class="btn btn-success" id="btn-export">🎬 Export</button>
        </div>
    </header>

    <div class="workspace">
        <aside>
            <div class="panel">
                <h3>Frames</h3>
                <div id="frame-list"></div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn" id="btn-add-frame" style="flex:1;" title="New Frame">+ Add</button>
                    <button class="btn" id="btn-dup-frame" style="flex:1;" title="Duplicate Frame">⧉ Dup</button>
                    <button class="btn" id="btn-del-frame" style="flex:1; color: var(--danger);" title="Delete Frame">− Del</button>
                </div>
            </div>
            <div class="panel" style="border-bottom: none; flex: 1;">
                <h3>Instructions</h3>
                <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;">
                    <b>Pinch / Scroll</b> to Zoom.<br>
                    <b>Click & Drag Canvas</b> to Pan.<br>
                    <b>Tap Palette Item</b> to place on field.<br>
                    <b>Click Player</b> for Action Menu.<br>
                    <b>Shortcuts:</b> Ctrl+Z, Ctrl+Y, Del.
                </p>
            </div>
        </aside>

        <main id="canvas-container">
            <canvas id="field"></canvas>
            <div id="radial-menu">
                <div class="radial-btn" data-action="run" data-label="Run Route">🏃</div>
                <div class="radial-btn" data-action="throw" data-label="Throw Ball">⚾</div>
                <div class="radial-btn" data-action="hit" data-label="Hit Arc">☄️</div>
                <div class="radial-btn" data-action="delete" data-label="Delete">🗑️</div>
            </div>
            <div class="viewport-controls">
                <button class="btn" id="btn-zoom-out">−</button>
                <button class="btn" id="btn-zoom-reset">Reset</button>
                <button class="btn" id="btn-zoom-in">+</button>
            </div>
            <div id="toast" class="toast"></div>
        </main>

        <aside class="right">
            <div class="panel">
                <div class="palette" style="grid-template-columns: 1fr;">
                    <div class="token ball" data-type="ball">⚾ BALL</div>
                </div>
            </div>
            <div class="panel">
                <h3>Defense</h3>
                <div class="palette" id="pal-def"></div>
            </div>
            <div class="panel" style="border-bottom: none;">
                <h3>Offense</h3>
                <div class="palette" id="pal-off"></div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
