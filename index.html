<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Playmaker Pro | Architect V9.0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="brand">Diamond<span>Architect</span></div>
        <div class="toolbar" role="toolbar" aria-label="Main controls">
            <button class="btn" id="btn-undo" title="Ctrl+Z" aria-label="Undo" disabled>↶ Undo</button>
            <button class="btn" id="btn-redo" title="Ctrl+Y" aria-label="Redo" disabled>↷ Redo</button>
            <button class="btn btn-warning" id="btn-reset" aria-label="Reset playbook">🔄 Reset</button>
            <div style="width: 1px; background: var(--border); margin: 0 0.2rem;"></div>
            <button class="btn" id="btn-save" aria-label="Save playbook">💾 Save</button>
            <button class="btn" id="btn-load" aria-label="Load playbook">📂 Load</button>
            <input type="file" id="file-load" accept=".json" style="display: none;" aria-hidden="true">
            <div style="width: 1px; background: var(--border); margin: 0 0.2rem;"></div>

            <div class="speed-control" title="Playback Speed">
                <span style="font-size: 0.7rem; color: var(--text-muted);">Speed</span>
                <input type="range" id="slider-speed" min="500" max="3000" step="250" value="1500" dir="rtl" aria-label="Animation speed">
            </div>

            <button class="btn btn-primary" id="btn-play" aria-label="Play animation">▶ Play</button>
            <button class="btn btn-success" id="btn-export" aria-label="Export to video">🎬 Export</button>
        </div>
    </header>

    <div class="workspace">
        <aside>
            <div class="panel">
                <h3>Frames</h3>
                <div id="frame-list" role="list"></div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn" id="btn-add-frame" style="flex:1;" title="New Frame" aria-label="Add frame">+ Add</button>
                    <button class="btn" id="btn-dup-frame" style="flex:1;" title="Duplicate Frame" aria-label="Duplicate frame">⧉ Dup</button>
                    <button class="btn" id="btn-del-frame" style="flex:1; color: var(--danger);" title="Delete Frame" aria-label="Delete frame">− Del</button>
                </div>
            </div>
            <div class="panel" style="border-bottom: none; flex: 1;">
                <h3>Instructions</h3>
                <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;">
                    <b>Pinch / Scroll</b> to Zoom.<br>
                    <b>Click & Drag Canvas</b> to Pan.<br>
                    <b>Tap Palette Item</b> to place on field.<br>
                    <b>Click Player</b> for Action Menu.<br>
                    <b>Shortcuts:</b> Ctrl+Z, Ctrl+Y, Del.
                </p>
            </div>
        </aside>

        <main id="canvas-container">
            <canvas id="field" aria-label="Interactive baseball field playbook"></canvas>

            <div id="radial-menu" role="menu" aria-hidden="true">
                <div class="radial-btn" data-action="run" data-label="Run Route" role="menuitem">🏃</div>
                <div class="radial-btn" data-action="throw" data-label="Throw Ball" role="menuitem">⚾</div>
                <div class="radial-btn" data-action="hit" data-label="Hit Arc" role="menuitem">☄️</div>
                <div class="radial-btn" data-action="delete" data-label="Delete" role="menuitem">🗑️</div>
            </div>

            <div class="viewport-controls" aria-label="Zoom controls">
                <button class="btn" id="btn-zoom-out" aria-label="Zoom out">−</button>
                <button class="btn" id="btn-zoom-reset" aria-label="Reset zoom">Reset</button>
                <button class="btn" id="btn-zoom-in" aria-label="Zoom in">+</button>
            </div>
            <div id="toast" class="toast" role="alert" aria-live="assertive"></div>
        </main>

        <aside class="right">
            <div class="panel">
                <div class="palette" style="grid-template-columns: 1fr;">
                    <div class="token ball" data-type="ball" role="button" aria-label="Add baseball">⚾ BALL</div>
                </div>
            </div>
            <div class="panel">
                <h3>Defense</h3>
                <div class="palette" id="pal-def"></div>
            </div>
            <div class="panel" style="border-bottom: none;">
                <h3>Offense</h3>
                <div class="palette" id="pal-off"></div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
