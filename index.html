<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Playmaker Pro | Architect V4.1</title>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155; --border: #475569;
            --text: #f8fafc; --text-muted: #94a3b8;
            --accent: #3b82f6; --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
            --offense: #ef4444; --defense: #3b82f6; --radius: 8px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; user-select: none; touch-action: none; }
        body { display: flex; flex-direction: column; height: 100dvh; background: var(--bg); color: var(--text); overflow: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 10; }
        .brand { font-weight: 800; font-size: 1.2rem; } .brand span { color: var(--accent); }
        .toolbar { display: flex; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.15s; }
        .btn:hover:not(:disabled) { background: var(--surface-hover); } .btn:active:not(:disabled) { transform: scale(0.96); } .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn-warning { background: var(--warning); border-color: var(--warning); color: #000; } .btn-warning:hover:not(:disabled) { background: #d97706; }

        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        aside { width: 280px; background: var(--bg); display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow-y: auto; z-index: 5; }
        aside.right { border-right: none; border-left: 1px solid var(--border); }
        .panel { padding: 1rem; border-bottom: 1px solid var(--border); }
        .panel h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; }

        #frame-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.5rem; }
        .frame-item { padding: 0.6rem; background: var(--surface); border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; transition: 0.2s; display: flex; align-items: center; }
        .frame-item.active { background: rgba(59, 130, 246, 0.15); border: 1px solid var(--accent); color: var(--accent); }
        .frame-name { outline: none; border-bottom: 1px dashed transparent; width: 100%; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .frame-name:focus { border-bottom-color: var(--text); cursor: text; }

        .palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
        .token { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; cursor: grab; background: var(--surface); border: 2px solid var(--border); margin: 0 auto; }
        .token.off { border-color: var(--offense); } .token.def { border-color: var(--defense); }
        .token.ball { grid-column: span 3; font-size: 1.2rem; border-style: dashed; }

        main { flex: 1; background: #080c14; position: relative; overflow: hidden; cursor: grab; }
        main.panning { cursor: grabbing !important; }
        canvas { display: block; width: 100%; height: 100%; }

        /* RADIAL MENU & CSS TOOLTIPS */
        #radial-menu { position: absolute; width: 140px; height: 140px; border-radius: 50%; z-index: 100; opacity: 0; transform: scale(0.8); pointer-events: none; transition: 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #radial-menu.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        
        .radial-btn { 
            position: absolute; width: 44px; height: 44px; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; 
            cursor: pointer; box-shadow: var(--shadow); left: 48px; top: 48px; color: var(--text);
        }
        
        .radial-btn::after {
            content: attr(data-label); position: absolute; left: 50%; transform: translateX(-50%) scale(0.95);
            background: var(--text); color: var(--bg); padding: 0.35rem 0.6rem; border-radius: 4px;
            font-size: 0.75rem; font-weight: 700; white-space: nowrap; opacity: 0; pointer-events: none;
            transition: 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: var(--shadow); z-index: 20;
        }
        
        .radial-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.15); z-index: 10; }
        .radial-btn:hover::after { opacity: 1; transform: translateX(-50%) scale(1); }
        .radial-btn[data-action="delete"]:hover { background: var(--danger); border-color: var(--danger); }
        
        .radial-btn:nth-child(1) { transform: translateY(-56px); } /* Run */
        .radial-btn:nth-child(2) { transform: translate(48px, -28px); } /* Throw */
        .radial-btn:nth-child(3) { transform: translate(48px, 28px); } /* Hit */
        .radial-btn:nth-child(4) { transform: translateY(56px); } /* Delete */

        .radial-btn:nth-child(1)::after, .radial-btn:nth-child(2)::after { bottom: calc(100% + 10px); }
        .radial-btn:nth-child(3)::after, .radial-btn:nth-child(4)::after { top: calc(100% + 10px); }

        .viewport-controls { position: absolute; bottom: 1rem; right: 1rem; display: flex; gap: 0.5rem; z-index: 50; }
        .viewport-controls .btn { padding: 0.4rem 0.8rem; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <header>
        <div class="brand">Diamond<span>Architect</span></div>
        <div class="toolbar">
            <button class="btn" id="btn-undo" disabled>↶ Undo</button>
            <button class="btn" id="btn-redo" disabled>↷ Redo</button>
            <div style="width: 1px; background: var(--border); margin: 0 0.5rem;"></div>
            <button class="btn btn-warning" id="btn-reset">🔄 Reset</button>
            <button class="btn btn-primary" id="btn-play">▶ Play</button>
        </div>
    </header>

    <div class="workspace">
        <aside>
            <div class="panel">
                <h3>Frames</h3>
                <div id="frame-list"></div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn" id="btn-add-frame" style="flex:1;">+ Add</button>
                    <button class="btn" id="btn-del-frame" style="flex:1; color: var(--danger);">− Del</button>
                </div>
            </div>
            <div class="panel" style="border-bottom: none; flex: 1;">
                <h3>Instructions</h3>
                <p style="font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;">
                    <b>Pinch / Scroll</b> to Zoom.<br>
                    <b>2-Fingers / Space+Drag</b> to Pan.<br>
                    <b>Click Player</b> for Action Menu.<br>
                    <b>Click Line</b> to Delete.<br>
                    <b>Click Frame Name</b> to rename.
                </p>
            </div>
        </aside>

        <main id="canvas-container">
            <canvas id="field"></canvas>
            <div id="radial-menu">
                <div class="radial-btn" data-action="run" data-label="Run Route">🏃</div>
                <div class="radial-btn" data-action="throw" data-label="Throw Ball">⚾</div>
                <div class="radial-btn" data-action="hit" data-label="Hit Arc">☄️</div>
                <div class="radial-btn" data-action="delete" data-label="Delete">🗑️</div>
            </div>
            <div class="viewport-controls">
                <button class="btn" id="btn-zoom-out">−</button>
                <button class="btn" id="btn-zoom-reset">Reset View</button>
                <button class="btn" id="btn-zoom-in">+</button>
            </div>
        </main>

        <aside class="right">
            <div class="panel">
                <div class="palette" style="grid-template-columns: 1fr;">
                    <div class="token ball" draggable="true" data-type="ball">⚾ BALL</div>
                </div>
            </div>
            <div class="panel">
                <h3>Defense (1-9)</h3>
                <div class="palette" id="pal-def"></div>
            </div>
            <div class="panel" style="border-bottom: none;">
                <h3>Offense</h3>
                <div class="palette" id="pal-off"></div>
            </div>
        </aside>
    </div>

<script>
/**
 * ARCHITECTURE V4.1
 * Includes Native Physics Multi-Touch Camera Anchoring & Precise Placement
 */

// ============================================================================
// 1. STATE STORE 
// ============================================================================
class StateStore {
    constructor() {
        this.frames = [{ id: 1, name: 'Frame 1', players: [], lines: [] }];
        this.currentIdx = 0;
        this.history = [];
        this.historyIdx = -1;
        this.nextId = 100;
    }

    get f() { return this.frames[this.currentIdx]; }

    save() {
        this.history = this.history.slice(0, this.historyIdx + 1);
        this.history.push(structuredClone(this.frames));
        if (this.history.length > 30) this.history.shift();
        else this.historyIdx++;
    }

    undo() {
        if (this.historyIdx > 0) {
            this.historyIdx--;
            this.frames = structuredClone(this.history[this.historyIdx]);
            this.currentIdx = Math.min(this.currentIdx, this.frames.length - 1);
            return true;
        }
        return false;
    }

    redo() {
        if (this.historyIdx < this.history.length - 1) {
            this.historyIdx++;
            this.frames = structuredClone(this.history[this.historyIdx]);
            this.currentIdx = Math.min(this.currentIdx, this.frames.length - 1);
            return true;
        }
        return false;
    }
}

// ============================================================================
// 2. VIEWPORT MANAGER
// ============================================================================
class Viewport {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.x = 0; this.y = 0; this.scale = 1;
        this.dpr = window.devicePixelRatio || 1;
        
        this.resize();
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        const rect = this.canvas.parentElement.getBoundingClientRect();
        this.width = rect.width;
        this.height = rect.height;
        this.canvas.width = this.width * this.dpr;
        this.canvas.height = this.height * this.dpr;
        this.canvas.style.width = `${this.width}px`;
        this.canvas.style.height = `${this.height}px`;
        this.centerOn(400, 400); 
    }

    clamp() {
        const boundsLimit = 800 * this.scale;
        this.x = Math.max(this.width - boundsLimit, Math.min(boundsLimit, this.x));
        this.y = Math.max(this.height - boundsLimit, Math.min(boundsLimit, this.y));
    }

    centerOn(worldX, worldY) {
        this.x = (this.width / 2) - (worldX * this.scale);
        this.y = (this.height / 2) - (worldY * this.scale);
        this.clamp();
    }

    screenToWorld(screenX, screenY) {
        return { x: (screenX - this.x) / this.scale, y: (screenY - this.y) / this.scale };
    }

    worldToScreen(worldX, worldY) {
        return { x: (worldX * this.scale) + this.x, y: (worldY * this.scale) + this.y };
    }

    apply() {
        this.ctx.setTransform(this.dpr * this.scale, 0, 0, this.dpr * this.scale, this.x * this.dpr, this.y * this.dpr);
    }

    resetToScreenSpace() {
        this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    }
}

// ============================================================================
// 3. RENDERER
// ============================================================================
class Renderer {
    constructor(ctx, viewport, config) {
        this.ctx = ctx;
        this.vp = viewport;
        this.cfg = config;
        
        const cx = 400, cy = 720, s = 2.8;
        this.GEO = {
            HOME: {x: cx, y: cy}, MOUND: {x: cx, y: cy - (46 * s)},
            B1: {x: cx + (60 * s * Math.cos(Math.PI/4)), y: cy - (60 * s * Math.sin(Math.PI/4))},
            B2: {x: cx, y: cy - (60 * s * Math.sqrt(2))},
            B3: {x: cx - (60 * s * Math.cos(Math.PI/4)), y: cy - (60 * s * Math.sin(Math.PI/4))}
        };
        this.COLORS = { foul: '#0f172a', fair: '#16a34a', dirt: '#b45309', run: '#f59e0b', throw: '#ffffff', hit: '#f97316' };
    }

    draw(state, inputIx, progress = null, animFrame = null) {
        this.vp.resetToScreenSpace();
        this.ctx.clearRect(0, 0, this.ctx.canvas.width, this.ctx.canvas.height);
        
        this.vp.apply();
        this.drawField();

        const isAnim = progress !== null;
        const frame = isAnim ? animFrame : state.f;
        const lines = isAnim ? frame.lines : [...frame.lines, inputIx.drawingLine].filter(Boolean);

        lines.forEach(l => this.drawLine(l, isAnim ? progress : 1, inputIx));

        this.vp.resetToScreenSpace();

        const entities = [...frame.players].sort((a,b) => a.type === 'ball' ? 1 : -1);
        entities.forEach(p => {
            let pos = {x: p.x, y: p.y};
            if(isAnim) pos = this.calcAnimPos(p, frame.lines, progress);
            
            const screenPos = this.vp.worldToScreen(pos.x, pos.y);
            this.drawToken(screenPos.x, screenPos.y, p, inputIx.activeEntity?.id === p.id && !isAnim);
        });
    }

    drawField() {
        const c = this.ctx, F = 200 * this.cfg.scale;
        
        c.save();
        c.beginPath(); c.moveTo(this.GEO.HOME.x, this.GEO.HOME.y);
        c.lineTo(this.GEO.HOME.x - F*Math.sin(Math.PI/4), this.GEO.HOME.y - F*Math.cos(Math.PI/4));
        c.arc(this.GEO.HOME.x, this.GEO.HOME.y, F, Math.PI*1.25, Math.PI*1.75);
        c.lineTo(this.GEO.HOME.x, this.GEO.HOME.y);
        c.clip();
        c.fillStyle = this.COLORS.fair; c.fill();
        
        c.beginPath(); c.arc(this.GEO.MOUND.x, this.GEO.MOUND.y, 50 * this.cfg.scale, 0, Math.PI*2);
        c.fillStyle = this.COLORS.dirt; c.fill();
        
        c.beginPath(); const ins = 3 * this.cfg.scale;
        c.moveTo(this.GEO.HOME.x, this.GEO.HOME.y - 12*this.cfg.scale);
        c.lineTo(this.GEO.B1.x - ins, this.GEO.B1.y);
        c.lineTo(this.GEO.B2.x, this.GEO.B2.y + ins);
        c.lineTo(this.GEO.B3.x + ins, this.GEO.B3.y);
        c.fillStyle = this.COLORS.fair; c.fill();
        
        [this.GEO.HOME, this.GEO.MOUND, this.GEO.B1, this.GEO.B2, this.GEO.B3].forEach(b => {
            c.beginPath(); c.arc(b.x, b.y, 8 * this.cfg.scale, 0, Math.PI*2);
            c.fillStyle = this.COLORS.dirt; c.fill();
        });
        c.restore();

        c.beginPath(); c.moveTo(this.GEO.HOME.x, this.GEO.HOME.y);
        c.lineTo(this.GEO.HOME.x - F*Math.sin(Math.PI/4), this.GEO.HOME.y - F*Math.cos(Math.PI/4));
        c.moveTo(this.GEO.HOME.x, this.GEO.HOME.y);
        c.lineTo(this.GEO.HOME.x + F*Math.sin(Math.PI/4), this.GEO.HOME.y - F*Math.cos(Math.PI/4));
        c.strokeStyle = '#cbd5e1'; c.lineWidth = 2; c.stroke();

        c.fillStyle = '#fff'; c.strokeStyle = '#000'; c.lineWidth = 1.5;
        [this.GEO.B1, this.GEO.B2, this.GEO.B3].forEach(b => {
            c.beginPath(); const size = 6; 
            c.moveTo(b.x, b.y - size); c.lineTo(b.x + size, b.y);
            c.lineTo(b.x, b.y + size); c.lineTo(b.x - size, b.y);
            c.closePath(); c.fill(); c.stroke();
        });

        c.beginPath(); const hp = 6;
        c.moveTo(this.GEO.HOME.x, this.GEO.HOME.y);
        c.lineTo(this.GEO.HOME.x - hp, this.GEO.HOME.y - hp);
        c.lineTo(this.GEO.HOME.x - hp, this.GEO.HOME.y - hp*2);
        c.lineTo(this.GEO.HOME.x + hp, this.GEO.HOME.y - hp*2);
        c.lineTo(this.GEO.HOME.x + hp, this.GEO.HOME.y - hp);
        c.closePath(); c.fill(); c.stroke();

        c.fillRect(this.GEO.MOUND.x - 6, this.GEO.MOUND.y - 2, 12, 4);
        c.strokeRect(this.GEO.MOUND.x - 6, this.GEO.MOUND.y - 2, 12, 4);
    }

    generateLinePath(l, progress = 1, inputIx = null) {
        const p2d = new Path2D();
        p2d.moveTo(l.start.x, l.start.y);
        
        const actEnd = { x: l.start.x + (l.end.x - l.start.x) * progress, y: l.start.y + (l.end.y - l.start.y) * progress };
        if(l === inputIx?.drawingLine) { actEnd.x = inputIx.mouseX; actEnd.y = inputIx.mouseY; }

        if (l.type === 'run') {
            const dist = Math.hypot(actEnd.x - l.start.x, actEnd.y - l.start.y);
            const ang = Math.atan2(actEnd.y - l.start.y, actEnd.x - l.start.x);
            for(let i=0; i<dist; i+=4) p2d.lineTo(l.start.x + Math.cos(ang)*i + Math.cos(ang+Math.PI/2)*Math.sin(i*0.3)*4, l.start.y + Math.sin(ang)*i + Math.sin(ang+Math.PI/2)*Math.sin(i*0.3)*4);
        } else if (l.type === 'throw') {
            p2d.lineTo(actEnd.x, actEnd.y);
        } else if (l.type === 'hit') {
            const cp = this.getArcCP(l.start, l === inputIx?.drawingLine ? actEnd : l.end);
            for(let t=0; t<=progress; t+=0.02) { 
                const pt = this.getBezier(t, l.start, cp, l === inputIx?.drawingLine ? actEnd : l.end); 
                p2d.lineTo(pt.x, pt.y); 
            }
        }
        return p2d;
    }

    drawLine(l, p, inputIx) {
        const c = this.ctx;
        const p2d = this.generateLinePath(l, p, inputIx);
        
        if (l.type === 'run') { c.strokeStyle = this.COLORS.run; c.lineWidth = 4; } 
        else if (l.type === 'throw') { c.strokeStyle = this.COLORS.throw; c.lineWidth = 3; c.setLineDash([8,6]); } 
        else if (l.type === 'hit') { c.strokeStyle = this.COLORS.hit; c.lineWidth = 4; c.setLineDash([12,8]); }
        
        c.stroke(p2d); c.setLineDash([]);
    }

    drawToken(screenX, screenY, p, isActive) {
        const c = this.ctx;
        c.beginPath(); c.arc(screenX, screenY, this.cfg.radius, 0, Math.PI*2);
        c.fillStyle = p.type === 'ball' ? '#fff' : (p.type === 'off' ? '#ef4444' : '#3b82f6'); 
        c.fill(); c.strokeStyle = p.type === 'ball' ? '#ef4444' : '#000'; c.lineWidth = 2; c.stroke();
        c.fillStyle = p.type === 'ball' ? '#000' : '#fff'; c.font = 'bold 12px sans-serif';
        c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText(p.label, screenX, screenY);

        if(isActive) {
            c.beginPath(); c.arc(screenX, screenY, this.cfg.radius+4, 0, Math.PI*2);
            c.fillStyle = 'rgba(255,255,255,0.2)'; c.fill();
        }
    }

    getArcCP(s, e) { return { x: (s.x+e.x)/2 + (e.x-this.GEO.HOME.x)*0.3, y: (s.y+e.y)/2 - Math.hypot(e.x-s.x, e.y-s.y)*0.8 - 60 }; }
    getBezier(t, s, cp, e) { return { x: (1-t)**2 * s.x + 2*(1-t)*t * cp.x + t**2 * e.x, y: (1-t)**2 * s.y + 2*(1-t)*t * cp.y + t**2 * e.y }; }
    
    calcAnimPos(p, lines, progress) {
        const l = lines.find(line => line.startId === p.id);
        if(!l) return {x: p.x, y: p.y};
        if(l.type === 'hit') return this.getBezier(progress, l.start, this.getArcCP(l.start, l.end), l.end);
        return { x: l.start.x + (l.end.x - l.start.x) * progress, y: l.start.y + (l.end.y - l.start.y) * progress };
    }
}

// ============================================================================
// 4. INPUT HANDLER 
// ============================================================================
class InputHandler {
    constructor(canvas, viewport, state, renderer, app) {
        this.canvas = canvas;
        this.vp = viewport;
        this.state = state;
        this.renderer = renderer;
        this.app = app;

        this.ix = { activeEntity: null, drawingLine: null, draggingPlayer: null, mouseX: 0, mouseY: 0 };
        this.keys = {};
        this.pointers = new Map();

        this._boundDown = this.onPointerDown.bind(this);
        this._boundMove = this.onPointerMove.bind(this);
        this._boundUp = this.onPointerUp.bind(this);
        
        this.canvas.addEventListener('pointerdown', this._boundDown);
        
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        
        this.canvas.addEventListener('wheel', e => {
            e.preventDefault();
            this.zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.9 : 1.1);
        }, { passive: false });
    }

    zoomAt(screenX, screenY, zoomDelta) {
        const rect = this.canvas.getBoundingClientRect();
        const mouseX = screenX - rect.left;
        const mouseY = screenY - rect.top;
        const worldPos = this.vp.screenToWorld(mouseX, mouseY);
        
        this.vp.scale *= zoomDelta;
        this.vp.scale = Math.max(0.5, Math.min(this.vp.scale, 3)); 
        this.vp.x = mouseX - (worldPos.x * this.vp.scale);
        this.vp.y = mouseY - (worldPos.y * this.vp.scale);
        this.vp.clamp();
        this.app.scheduleRender();
    }

    attachGlobalMove() {
        document.addEventListener('pointermove', this._boundMove);
    }

    detachGlobalMove() {
        if(this.pointers.size === 0 && !this.ix.drawingLine) {
            document.removeEventListener('pointermove', this._boundMove);
        }
    }

    getMidpoint(p1, p2) { return { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2 }; }
    getDistance(p1, p2) { return Math.hypot(p2.x - p1.x, p2.y - p1.y); }

    onPointerDown(e) {
        this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        this.attachGlobalMove();
        document.addEventListener('pointerup', this._boundUp);

        if (this.pointers.size === 2) {
            const pts = Array.from(this.pointers.values());
            this.pinchStartDist = this.getDistance(pts[0], pts[1]);
            this.pinchStartScale = this.vp.scale;
            this.panStartMid = this.getMidpoint(pts[0], pts[1]);
            this.panStartVP = { x: this.vp.x, y: this.vp.y };
            this.ix.draggingPlayer = null; 
            return;
        }

        const rect = this.canvas.getBoundingClientRect();
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;
        const worldPos = this.vp.screenToWorld(screenX, screenY);

        if (this.keys['Space'] || e.button === 1) {
            this.pointers.set('pan', { x: screenX, y: screenY, vpX: this.vp.x, vpY: this.vp.y });
            this.canvas.parentElement.classList.add('panning');
            return;
        }

        if (this.ix.drawingLine) {
            this.ix.drawingLine.end = worldPos;
            this.state.f.lines.push(this.ix.drawingLine);
            this.ix.drawingLine = null;
            this.state.save(); this.app.scheduleRender();
            this.detachGlobalMove();
            return;
        }

        const hitPlayer = [...this.state.f.players].reverse().find(p => {
            const pScreen = this.vp.worldToScreen(p.x, p.y);
            return Math.hypot(screenX - pScreen.x, screenY - pScreen.y) <= 24;
        });

        if (hitPlayer) {
            this.ix.draggingPlayer = hitPlayer;
            this.ix.dragStart = {x: hitPlayer.x, y: hitPlayer.y};
            this.app.closeRadial();
            return;
        }

        this.renderer.vp.apply();
        this.renderer.ctx.lineWidth = 20 / this.vp.scale; 
        for (let i = this.state.f.lines.length - 1; i >= 0; i--) {
            const l = this.state.f.lines[i];
            const p2d = this.renderer.generateLinePath(l);
            if (this.renderer.ctx.isPointInStroke(p2d, screenX * this.vp.dpr, screenY * this.vp.dpr)) {
                this.state.f.lines.splice(i, 1);
                this.state.save(); this.app.scheduleRender();
                return;
            }
        }

        this.app.closeRadial();
    }

    onPointerMove(e) {
        if(this.pointers.has(e.pointerId)) {
            this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        }

        const rect = this.canvas.getBoundingClientRect();
        
        // Exact Affine Transform for Multi-Touch Pan/Zoom Anchoring
        if (this.pointers.size === 2) {
            const pts = Array.from(this.pointers.values());
            const currentDist = this.getDistance(pts[0], pts[1]);
            const currentMid = this.getMidpoint(pts[0], pts[1]);
            
            // 1. Calculate precise new scale
            const targetScale = this.pinchStartScale * (currentDist / this.pinchStartDist);
            const clampedScale = Math.max(0.5, Math.min(targetScale, 3));
            
            // 2. Identify the original World coordinate beneath the start of the pinch
            const startMidScreenX = this.panStartMid.x - rect.left;
            const startMidScreenY = this.panStartMid.y - rect.top;
            const worldPivotX = (startMidScreenX - this.panStartVP.x) / this.pinchStartScale;
            const worldPivotY = (startMidScreenY - this.panStartVP.y) / this.pinchStartScale;
            
            // 3. Identify where the fingers currently are
            const currentMidScreenX = currentMid.x - rect.left;
            const currentMidScreenY = currentMid.y - rect.top;
            
            // 4. Transform viewport so the world pivot perfectly matches the current finger position
            this.vp.scale = clampedScale;
            this.vp.x = currentMidScreenX - (worldPivotX * this.vp.scale);
            this.vp.y = currentMidScreenY - (worldPivotY * this.vp.scale);
            
            this.vp.clamp();
            this.app.scheduleRender();
            return;
        }

        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;

        if (this.pointers.has('pan')) {
            const start = this.pointers.get('pan');
            this.vp.x = start.vpX + (screenX - start.x);
            this.vp.y = start.vpY + (screenY - start.y);
            this.vp.clamp();
            this.app.scheduleRender();
            return;
        }

        const worldPos = this.vp.screenToWorld(screenX, screenY);
        this.ix.mouseX = worldPos.x; this.ix.mouseY = worldPos.y;

        if (this.ix.draggingPlayer) {
            this.ix.draggingPlayer.x = worldPos.x;
            this.ix.draggingPlayer.y = worldPos.y;
            this.app.scheduleRender();
        } else if (this.ix.drawingLine) {
            this.app.scheduleRender();
        }
    }

    onPointerUp(e) {
        this.pointers.delete(e.pointerId);
        
        if (this.pointers.has('pan') && !this.keys['Space']) {
            this.pointers.delete('pan');
            this.canvas.parentElement.classList.remove('panning');
        }

        if (this.pointers.size === 0) {
            document.removeEventListener('pointerup', this._boundUp);
            this.detachGlobalMove();
        }

        if (this.ix.draggingPlayer) {
            const p = this.ix.draggingPlayer;
            const dist = Math.hypot(p.x - this.ix.dragStart.x, p.y - this.ix.dragStart.y);
            
            if (dist < 3) this.app.openRadial(p); 
            else this.state.save(); 
            
            this.ix.draggingPlayer = null;
            this.app.scheduleRender();
        }
    }
}

// ============================================================================
// 5. APP CONTROLLER
// ============================================================================
class App {
    constructor() {
        this.canvas = document.getElementById('field');
        this.cfg = { scale: 2.8, radius: 14, animSpeed: 1500 };
        
        this.state = new StateStore();
        this.vp = new Viewport(this.canvas);
        this.renderer = new Renderer(this.canvas.getContext('2d'), this.vp, this.cfg);
        this.input = new InputHandler(this.canvas, this.vp, this.state, this.renderer, this);
        
        this.pendingRedraw = false;
        this.animating = false;
        this.animReq = null;
        
        this.initUI();
        this.prePopulate();
        this.state.save();
        this.scheduleRender();
    }

    prePopulate() {
        const cx = 400, cy = 720, s = 2.8;
        const add = (lbl, typ, x, y) => this.state.f.players.push({id: this.state.nextId++, label: lbl, type: typ, x, y});
        
        const b1 = {x: cx + (60*s*Math.cos(Math.PI/4)), y: cy - (60*s*Math.sin(Math.PI/4))};
        const b2 = {x: cx, y: cy - (60*s*Math.sqrt(2))};
        const b3 = {x: cx - (60*s*Math.cos(Math.PI/4)), y: cy - (60*s*Math.sin(Math.PI/4))};

        // Precise positioning based on visual feedback
        add('1', 'def', cx, cy - (46*s));
        add('2', 'def', cx, cy + 35);
        add('3', 'def', b1.x - 30, b1.y - 15);
        add('4', 'def', b2.x + 40, b2.y + 15);
        add('5', 'def', b3.x + 30, b3.y - 15);
        add('6', 'def', b2.x - 40, b2.y + 15);
        add('7', 'def', b3.x - 40, b3.y - 140);
        add('8', 'def', b2.x, b2.y - 170);
        add('9', 'def', b1.x + 40, b1.y - 140);
        
        add('B1', 'off', cx - 22, cy); // Left batter's box
        add('⚾', 'ball', cx, cy - (46*s));
    }

    initUI() {
        const def = document.getElementById('pal-def');
        const off = document.getElementById('pal-off');
        for(let i=1; i<=9; i++) def.innerHTML += `<div class="token def" draggable="true" data-type="def">${i}</div>`;
        ['B1','B2','B3','B4'].forEach(l => off.innerHTML += `<div class="token off" draggable="true" data-type="off">${l}</div>`);
        
        document.querySelectorAll('.token').forEach(t => t.addEventListener('dragstart', e => { e.dataTransfer.setData('label', e.target.innerText); e.dataTransfer.setData('type', e.target.dataset.type); }));
        
        this.canvas.addEventListener('dragover', e => e.preventDefault());
        this.canvas.addEventListener('drop', e => {
            e.preventDefault();
            const rect = this.canvas.getBoundingClientRect();
            const wPos = this.vp.screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
            this.state.f.players.push({id: this.state.nextId++, label: e.dataTransfer.getData('label'), type: e.dataTransfer.getData('type'), x: wPos.x, y: wPos.y});
            this.state.save(); this.scheduleRender();
        });

        document.getElementById('btn-undo').onclick = () => { if(this.state.undo()) this.syncUI(), this.scheduleRender(); };
        document.getElementById('btn-redo').onclick = () => { if(this.state.redo()) this.syncUI(), this.scheduleRender(); };
        
        document.getElementById('btn-reset').onclick = () => {
            if(confirm('Reset field to standard setup?')) {
                this.state.f.players = []; this.state.f.lines = [];
                this.prePopulate(); this.state.save(); this.scheduleRender();
            }
        };

        document.getElementById('btn-add-frame').onclick = () => {
            if(this.animating) return;
            const nF = structuredClone(this.state.f);
            nF.id = Date.now(); nF.name = `Frame ${this.state.frames.length + 1}`; nF.lines = [];
            nF.players.forEach(p => { const l = this.state.f.lines.find(li => li.startId === p.id); if(l) { p.x = l.end.x; p.y = l.end.y; }});
            this.state.frames.push(nF); this.state.currentIdx = this.state.frames.length - 1;
            this.state.save(); this.syncUI(); this.scheduleRender();
        };

        document.getElementById('btn-del-frame').onclick = () => {
            if(this.state.frames.length <= 1 || this.animating) return;
            this.state.frames.splice(this.state.currentIdx, 1);
            this.state.currentIdx = Math.max(0, this.state.currentIdx - 1);
            this.state.save(); this.syncUI(); this.scheduleRender();
        }

        document.getElementById('btn-play').onclick = () => this.toggleAnim();
        
        document.getElementById('btn-zoom-in').onclick = () => { 
            const rect = this.canvas.getBoundingClientRect();
            this.input.zoomAt(rect.left + rect.width/2, rect.top + rect.height/2, 1.2); 
        };
        document.getElementById('btn-zoom-out').onclick = () => { 
            const rect = this.canvas.getBoundingClientRect();
            this.input.zoomAt(rect.left + rect.width/2, rect.top + rect.height/2, 0.8); 
        };
        document.getElementById('btn-zoom-reset').onclick = () => { this.vp.scale = 1; this.vp.centerOn(400, 400); this.scheduleRender(); };

        document.querySelectorAll('.radial-btn').forEach(b => b.addEventListener('pointerdown', e => {
            e.stopPropagation(); this.executeAction(e.target.closest('.radial-btn').dataset.action);
        }));
        
        this.syncUI();
    }

    syncUI() {
        document.getElementById('btn-undo').disabled = this.state.historyIdx <= 0;
        document.getElementById('btn-redo').disabled = this.state.historyIdx >= this.state.history.length - 1;
        const list = document.getElementById('frame-list'); list.innerHTML = '';
        this.state.frames.forEach((frm, i) => {
            const d = document.createElement('div'); d.className = `frame-item ${i === this.state.currentIdx ? 'active' : ''}`;
            
            const span = document.createElement('span'); span.className = 'frame-name';
            span.contentEditable = true; span.spellcheck = false; span.innerText = frm.name;
            span.onclick = (e) => { e.stopPropagation(); this.state.currentIdx = i; this.syncUI(); this.scheduleRender(); };
            span.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); e.target.blur(); } };
            span.onblur = (e) => { 
                let safeName = e.target.innerText.replace(/\n/g, '').slice(0, 30);
                e.target.innerText = safeName;
                this.state.frames[i].name = safeName; 
                this.state.save(); 
            };
            
            d.appendChild(span); list.appendChild(d);
        });
    }

    openRadial(player) {
        this.input.ix.activeEntity = player;
        const domPos = this.vp.worldToScreen(player.x, player.y);
        const menu = document.getElementById('radial-menu');
        menu.style.left = `${domPos.x - 70}px`; menu.style.top = `${domPos.y - 70}px`;
        menu.classList.add('active');
    }

    closeRadial() {
        document.getElementById('radial-menu').classList.remove('active');
        this.input.ix.activeEntity = null;
    }

    executeAction(action) {
        const p = this.input.ix.activeEntity; this.closeRadial(); if(!p) return;
        if(action === 'delete') { this.state.f.players = this.state.f.players.filter(ent => ent.id !== p.id); this.state.f.lines = this.state.f.lines.filter(l => l.startId !== p.id); this.state.save(); this.scheduleRender(); return; }
        this.input.ix.drawingLine = { id: this.state.nextId++, startId: p.id, type: action, start: {x: p.x, y: p.y}, end: {x: p.x, y: p.y} };
        this.input.attachGlobalMove(); 
    }

    toggleAnim() {
        if(this.animating) {
            cancelAnimationFrame(this.animReq);
            this.animating = false;
            const btn = document.getElementById('btn-play');
            btn.innerHTML = '▶ Play'; btn.classList.replace('btn-danger', 'btn-primary');
            this.scheduleRender();
            return;
        }
        
        if(this.state.frames.length < 2) return;
        
        this.animating = true;
        const btn = document.getElementById('btn-play');
        btn.innerHTML = '⏹ Stop'; btn.classList.replace('btn-primary', 'btn-danger');

        let cIdx = 0, sTime = null;
        const step = (ts) => {
            if(!sTime) sTime = ts;
            const p = Math.min((ts - sTime) / this.cfg.animSpeed, 1);
            this.renderer.draw(this.state, this.input.ix, p, this.state.frames[cIdx]);

            if(p < 1) {
                this.animReq = requestAnimationFrame(step);
            } else {
                cIdx++; sTime = null;
                if(cIdx < this.state.frames.length) {
                    this.animReq = requestAnimationFrame(step);
                } else {
                    this.animating = false;
                    btn.innerHTML = '▶ Play'; btn.classList.replace('btn-danger', 'btn-primary');
                    this.state.currentIdx = this.state.frames.length - 1;
                    this.syncUI();
                    this.renderer.draw(this.state, this.input.ix, 1.0, this.state.frames[this.state.currentIdx]);
                }
            }
        };
        this.animReq = requestAnimationFrame(step);
    }

    scheduleRender() {
        if(!this.pendingRedraw) {
            this.pendingRedraw = true;
            requestAnimationFrame(() => { this.renderer.draw(this.state, this.input.ix); this.pendingRedraw = false; });
        }
    }
}

document.addEventListener('DOMContentLoaded', () => window.PlaymakerApp = new App());
</script>
